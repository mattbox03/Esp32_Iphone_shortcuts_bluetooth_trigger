; PlatformIO - ESP32 BT Trigger
; ESP32 as a Classic Bluetooth (not BLE) HID device for iPhone:
; it pairs, and on connect it fires an iOS Shortcuts automation.
;
; Framework: ESP-IDF (NOT Arduino). The "BT HID Device" role is disabled in
; PlatformIO's precompiled Arduino libraries (CONFIG_BT_HID_ENABLED is not set),
; so the esp_bt_hid_device_* functions fail to link.

[env:wemos_d1_mini32]
; Platform 6.9.0: native pair ESP-IDF 5.3.1 + GCC 13.2.0. We force CMake 3.30
; because this line ships CMake 3.16, which fails the compiler test on Windows.
; (Change 'board' if you use another ESP32 module *with Classic Bluetooth*, e.g. esp32dev.)
platform = espressif32@6.9.0
board = wemos_d1_mini32
framework = espidf

platform_packages =
    platformio/tool-cmake @ ~3.30.0

monitor_speed = 115200

; Serial port is auto-detected. If you have several devices, set yours:
; upload_port = COMx
; monitor_port = COMx
