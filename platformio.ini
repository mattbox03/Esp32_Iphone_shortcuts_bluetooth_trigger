; PlatformIO - ESP32 BT Trigger + Find My (dual mode)
; Classic Bluetooth HID trigger (iOS Shortcuts) AND a BLE "Find My"
; (OpenHaystack) beacon, on one classic ESP32.
;
; Framework: ESP-IDF (NOT Arduino). The BT HID Device role is disabled in the
; precompiled Arduino libraries, so it must be rebuilt from source.

[env:wemos_d1_mini32]
; Platform 6.9.0: native pair ESP-IDF 5.3.1 + GCC 13.2.0. CMake forced to 3.30
; because the bundled 3.16 fails the compiler test on Windows.
platform = espressif32@6.9.0
board = wemos_d1_mini32
framework = espidf

platform_packages =
    platformio/tool-cmake @ ~3.30.0

monitor_speed = 115200

; Serial port auto-detected; set yours if needed:
; upload_port = COMx
; monitor_port = COMx
